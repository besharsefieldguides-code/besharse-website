<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Diagnostics & Subnet Analytics</title>
    <style>
        :root {
            --bg-color: #0d0f12;
            --card-bg: #161a22;
            --accent-green: #00ff66;
            --accent-blue: #00bfff;
            --text-main: #e1e7ed;
            --text-muted: #6e7681;
            --border-color: #30363d;
            --error-red: #ff4444;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        .sidebar {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .sidebar h2 {
            font-size: 16px;
            color: var(--accent-green);
            margin-top: 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            letter-spacing: 1px;
        }

        .main-content {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 20px;
        }

        .header-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr 1.21fr;
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card h3 {
            margin: 0;
            color: var(--accent-blue);
            font-size: 14px;
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 12px;
            color: var(--text-muted);
        }

        input[type="text"], select {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px;
            border-radius: 4px;
            font-family: inherit;
            box-sizing: border-box;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .action-trigger {
            background-color: transparent;
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: all 0.2s;
        }

        .action-trigger:hover {
            background-color: rgba(0, 255, 102, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.2);
        }

        /* Analytics Output Layout */
        .analytics-display {
            background-color: #05070a;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 15px;
            font-size: 13px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .data-row {
            display: grid;
            grid-template-columns: 160px 1fr;
            border-bottom: 1px dashed #1f242c;
            padding-bottom: 6px;
        }

        .data-label {
            color: var(--text-muted);
        }

        .data-value {
            color: var(--accent-green);
            word-break: break-all;
        }

        .error-message {
            color: var(--error-red);
            font-size: 12px;
            display: none;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: var(--accent-green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--accent-green);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ANALYSIS MODULES</h2>
        <div style="font-size: 12px; color: var(--accent-blue);">● IP Calculator [ACTIVE]</div>
        <div style="font-size: 12px; color: var(--text-muted); margin-top: 10px;">○ Port Mapper [OFFLINE]</div>
        <div style="font-size: 12px; color: var(--text-muted);">○ Packet Parser [OFFLINE]</div>
    </div>

    <div class="main-content">
        <div class="header-panel">
            <span>TERMINAL MODULE: NETWORK_ANALYZER_V2</span>
            <div>
                <span class="status-dot"></span>
                <span style="margin-left: 8px; font-size: 13px;">LOCAL ENGINE READY</span>
            </div>
        </div>

        <div class="workspace">
            <!-- Left Side: Inputs -->
            <div class="card">
                <h3>TARGET CONTEXT</h3>
                
                <div class="input-group">
                    <label for="ip-input">IPv4 Target Address</label>
                    <input type="text" id="ip-input" placeholder="e.g., 192.168.1.50" value="192.168.1.50">
                    <div id="error-box" class="error-message">Invalid IPv4 format.</div>
                </div>

                <div class="input-group">
                    <label for="cidr-input">CIDR Subnet Prefix</label>
                    <select id="cidr-input">
                        <option value="30">/30 (255.255.255.252) - Point-to-Point</option>
                        <option value="29">/29 (255.255.255.248)</option>
                        <option value="28">/28 (255.255.255.240)</option>
                        <option value="24" selected>/24 (255.255.255.0) - Standard LAN</option>
                        <option value="16">/16 (255.255.0.0) - Enterprise</option>
                        <option value="8">/8 (255.0.0.0) - Large Scale</option>
                    </select>
                </div>

                <button class="action-trigger" onclick="calculateNetwork()">PARSE NETWORK MATRIX</button>
            </div>

            <!-- Right Side: Analytics Calculations Output -->
            <div class="card">
                <h3>ALGEBRAIC NETWORK OUTPUT</h3>
                <div class="analytics-display">
                    <div class="data-row">
                        <div class="data-label">Network ID:</div>
                        <div class="data-value" id="out-net">--</div>
                    </div>
                    <div class="data-row">
                        <div class="data-label">Netmask:</div>
                        <div class="data-value" id="out-mask">--</div>
                    </div>
                    <div class="data-row">
                        <div class="data-label">Usable Range:</div>
                        <div class="data-value" id="out-range">--</div>
                    </div>
                    <div class="data-row">
                        <div class="data-label">Broadcast Addr:</div>
                        <div class="data-value" id="out-broad">--</div>
                    </div>
                    <div class="data-row">
                        <div class="data-label">Total Hosts:</div>
                        <div class="data-value" id="out-hosts">--</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Core validation and mathematical processing engine
        function calculateNetwork() {
            const ipString = document.getElementById('ip-input').value.trim();
            const cidr = parseInt(document.getElementById('cidr-input').value, 10);
            const errorBox = document.getElementById('error-box');
            
            // Validate basic IPv4 structural pattern
            const ipPattern = /^([0-9]{1,3})\.([0-9]{1,3})\.([0-9]{1,3})\.([0-9]{1,3})\$/;
            if (!ipPattern.test(ipString)) {
                errorBox.style.display = 'block';
                return;
            }
            
            const octets = ipString.split('.').map(Number);
            if (octets.some(octet => octet > 255)) {
                errorBox.style.display = 'block';
                return;
            }
            
            errorBox.style.display = 'none';

            // Convert array of bytes to single unsigned integer representation
            const ipInt = (octets[0] << 24) >>> 0 | (octets[1] << 16) >>> 0 | (octets[2] << 8) >>> 0 | octets[3] >>> 0;
            
            // Calculate mask values using bitwise shifts
            const maskInt = cidr === 0 ? 0 : (~0 << (32 - cidr)) >>> 0;
            const netInt = (ipInt & maskInt) >>> 0;
            const broadInt = (netInt | ~maskInt) >>> 0;
            
            const totalHosts = Math.max(0, (broadInt - netInt) - 1);
            
            // Helper function to map structural integers back to string dot notation
            function intToIp(intVal) {
                return [
                    (intVal >>> 24) & 255,
                    (intVal >>> 16) & 255,
                    (intVal >>> 8) & 255,
                    intVal & 255
                ].join('.');
            }

            // Write properties dynamically into layout nodes
            document.getElementById('out-net').innerText = `${intToIp(netInt)} /${cidr}`;
