<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROJECT: SURVIVAL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-root">
        <!-- Menu Layer -->
        <div id="menu-screen" class="view">
            <h1>BLACK_OPS_CORE</h1>
            <div class="menu-grid">
                <button onclick="Engine.setState('combat')">DEPLOY</button>
                <button onclick="Engine.setState('inventory')">INVENTORY</button>
                <button onclick="Engine.setState('crates')">CRATE_DEPOT</button>
            </div>
            <div class="stats">KEYS: <span id="key-count">0</span> | LVL: <span id="level-count">1</span></div>
        </div>

        <!-- Inventory Layer -->
        <div id="inventory-screen" class="view hidden">
            <h1>LOADOUT</h1>
            <div id="inventory-list"></div>
            <button onclick="Engine.setState('menu')">BACK</button>
        </div>

        <!-- Combat Layer -->
        <div id="combat-screen" class="view hidden">
            <div class="hud">ROUND: <span id="round-val">1</span></div>
            <div id="game-canvas">
                <!-- 3D Engine will mount here -->
                <div class="debug-ai">AI_ENEMIES: <span id="ai-count">1</span></div>
            </div>
        </div>
    </div>
    <script src="engine.js"></script>
</body>
</html>
