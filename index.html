<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Combat Sandbox</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* Tactical HUD Display */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
            box-sizing: border-box;
            z-index: 5;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        .hud-card {
            background: rgba(15, 15, 15, 0.85);
            padding: 12px 24px;
            border-radius: 4px;
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            border-left: 4px solid #00ff66;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #health-card {
            border-left: 4px solid #ff3333;
        }
        #ammo-display {
            border-left: none;
            border-right: 4px solid #00ff66;
        }
        /* Red Damage Flash Screen Overlay */
        #damage-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 0, 0, 0);
            pointer-events: none;
            transition: background-color 0.1s ease-out;
            z-index: 4;
        }
        /* Snappy Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background-color: #00ff66;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 6px #00ff66;
            z-index: 5;
        }
        /* Menu Screens */
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 10, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            cursor: pointer;
            text-align: center;
            z-index: 10;
        }
        #instructions {
            font-size: 36px;
            font-weight: 900;
            color: #00ff66;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .sub-text {
            color: #aaaaaa;
            font-size: 16px;
            margin-top: 5px;
        }
    </style>
    <!-- Three.js Engine Layer -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="damage-overlay"></div>

    <div id="blocker">
        <div id="instructions">DEPLOY TO FIELD</div>
        <div class="sub-text">WASD = Move Responsively | Mouse = Aim | Left Click = Fire | R = Reload</div>
        <div id="game-over-msg" style="color: #ff3333; margin-top: 20px; font-weight: bold; display: none; font-size: 20px;">ELIMINATED. RESETTING TO ROUND 1.</div>
    </div>

    <div id="hud">
        <div class="hud-row">
            <div class="hud-card">ROUND: <span id="round-val">1</span></div>
            <div class="hud-card" id="health-card">HP: <span id="hp-val">100</span></div>
            <div class="hud-card">HOSTILES: <span id="bots-val">1</span></div>
        </div>
        <div class="hud-row" style="justify-content: flex-end;">
            <div class="hud-card" id="ammo-display">AMMO: <span id="ammo-val">30</span>/30</div>
        </div>
    </div>
    
    <div id="crosshair"></div>

    <canvas id="game-canvas"></canvas>

    <script src="PlayerMovement.js"></script>
</body>
</html>
