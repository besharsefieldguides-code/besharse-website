<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            text-align: center;
        }
        #score-board {
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        canvas {
            background-color: #111111;
            border: 4px solid #444444;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: block;
        }
        .instructions {
            margin-top: 15px;
            color: #888888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">Score: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="instructions">Use WASD or Arrow Keys to move. Collect the green targets!</div>
    </div>

    <script src="PlayerMovement.js"></script>
</body>
</html>
