<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security Control Center</title>
    <style>
        :root {
            --bg-color: #0d0f12;
            --card-bg: #161a22;
            --accent-green: #00ff66;
            --accent-blue: #00bfff;
            --text-main: #e1e7ed;
            --text-muted: #6e7681;
            --border-color: #30363d;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        /* Sidebar Navigation Layout */
        .sidebar {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .sidebar h2 {
            font-size: 18px;
            color: var(--accent-green);
            margin-top: 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .nav-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px;
            text-align: left;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        /* Main Workspace Content Panel */
        .main-content {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 20px;
        }

        .header-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card h3 {
            margin: 0;
            color: var(--accent-blue);
            font-size: 16px;
        }

        /* Input Elements & Controls */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        input[type="text"] {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px;
            border-radius: 4px;
            font-family: inherit;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .action-trigger {
            background-color: transparent;
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: background 0.2s;
        }

        .action-trigger:hover {
            background-color: rgba(0, 255, 102, 0.1);
        }

        /* Simulator Terminal Output Box */
        .terminal-log {
            background-color: #05070a;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-size: 12px;
            color: #88ff88;
            white-space: pre-wrap;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: var(--accent-green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--accent-green);
        }
    </style>
</head>
<body>

    <!-- Left Column Navigation Module -->
    <div class="sidebar">
        <h2>CORE UTILITIES</h2>
        <button class="nav-btn" onclick="logAction('Module: Network Analyzer loaded.')">Network Scope</button>
        <button class="nav-btn" onclick="logAction('Module: Firewall Tester loaded.')">Firewall Audit</button>
        <button class="nav-btn" onclick="logAction('Module: Protocol Logger loaded.')">Protocol Logs</button>
        <button class="nav-btn" onclick="logAction('Module: Config Panel loaded.')">System Config</button>
    </div>

    <!-- Main Workspace Area -->
    <div class="main-content">
        <div class="header-panel">
            <span>STATION: WORKSPACE_NODE_01</span>
            <div>
                <span class="status-dot"></span>
                <span style="margin-left: 8px; font-size: 14px;">SYSTEM SECURE</span>
            </div>
        </div>

        <div class="workspace">
            <!-- Left Grid Pane: Simulation Controls -->
            <div class="card">
                <h3>SIMULATION PARAMETERS</h3>
                
                <div class="input-group">
                    <label for="target-ip" style="font-size: 12px; color: var(--text-muted);">Target IP Address / Domain</label>
                    <input type="text" id="target-ip" placeholder="127.0.0.1" value="192.168.1.1">
                </div>

                <div class="input-group">
                    <label for="packet-count" style="font-size: 12px; color: var(--text-muted);">Sample Data Packets</label>
                    <input type="text" id="packet-count" placeholder="Count" value="64">
                </div>

                <button class="action-trigger" onclick="runSimulatedAudit()">INITIALIZE DIAGNOSTIC RUN</button>
            </div>

            <!-- Right Grid Pane: Visual Terminal Log -->
            <div class="card">
                <h3>CONSOLE MONITOR</h3>
                <div class="terminal-log" id="terminalLog">Initializing main console array... Ready.&#10;</div>
                <button class="nav-btn" style="text-align: center; font-size: 12px;" onclick="clearLog()">Clear Terminal Logs</button>
            </div>
        </div>
    </div>

    <!-- Interface Logic Rules -->
    <script>
        const logBox = document.getElementById('terminalLog');

        function logAction(message) {
            const timestamp = new Date().toLocaleTimeString();
            logBox.innerText += `[${timestamp}] ${message}\n`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function clearLog() {
            logBox.innerText = "Console logs flushed.\n";
        }

        function runSimulatedAudit() {
            const target = document.getElementById('target-ip').value || '127.0.0.1';
            const packets = document.getElementById('packet-count').value || '64';
            
            logAction(`Starting network diagnosis sequence on endpoint: ${target}`);
            
            setTimeout(() => {
                logAction(`Broadcasting ${packets} test echo requests...`);
            }, 600);

            setTimeout(() => {
                logAction(`Response gathered. Latency nominal. Packet loss: 0%.`);
                logAction(`Diagnostic sequence safely completed.`);
            }, 1500);
        }
    </script>
</body>
</html>
