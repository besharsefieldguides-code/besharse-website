<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Besharse Field Guides</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&family=Segoe+UI:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Olive Green Loading Spinner Screen Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Top Navigation Bar -->
    <nav class="navbar">
        <span class="nav-title">Besharse Field Guides</span>
        <div class="nav-links">
            <a href="javascript:void(0);" id="tab-home" onclick="handleTabRefresh('tab-home', '#home')" class="nav-item">Home</a>
            <a href="javascript:void(0);" id="tab-about" onclick="handleTabRefresh('tab-about', '#about')" class="nav-item">About</a>
            <a href="javascript:void(0);" id="tab-books" onclick="handleTabRefresh('tab-books', '#books')" class="nav-item">Books</a>
            <a href="javascript:void(0);" id="tab-services" onclick="handleTabRefresh('tab-services', '#services')" class="nav-item">Services</a>
            <a href="javascript:void(0);" id="tab-events" onclick="handleTabRefresh('tab-events', '#events')" class="nav-item">Events</a>
            <a href="javascript:void(0);" id="tab-blog" onclick="handleTabRefresh('tab-blog', '#blog')" class="nav-item">Blog</a>
            <!-- Updated: ID changed to 'tab-contact' and link text changed to 'Contact' -->
            <a href="javascript:void(0);" id="tab-contact" onclick="handleTabRefresh('tab-contact', '#contact')" class="nav-item">Contact</a>
            <a href="javascript:void(0);" id="tab-social" onclick="handleTabRefresh('tab-social', '#social-media')" class="nav-item">Social Media</a>
            <a href="javascript:void(0);" id="tab-donate" onclick="handleTabRefresh('tab-donate', '#donate')" class="nav-item donate-btn">Make a Donation</a>
        </div>
    </nav>

    <!-- Hero Slider Section -->
    <header class="hero-section" id="hero-slider">
        <div class="hero-content">
            <h1 class="hero-title">Welcome to<br>Besharse Field Guides</h1>
            <a href="javascript:void(0);" onclick="handleTabRefresh('tab-about', '#about')" class="btn-read-more">Read More</a>
        </div>

        <div class="slider-controls-container">
            <button class="slider-arrow" onclick="changeSlide(-1)">&lt;</button>
            <div class="slider-dots">
                <span class="dot" onclick="setSlide(0)"></span>
                <span class="dot" onclick="setSlide(1)"></span>
                <span class="dot" onclick="setSlide(2)"></span>
            </div>
            <button class="slider-arrow" onclick="changeSlide(1)">&gt;</button>
        </div>
    </header>

    <script src="script.js"></script>
</body>
</html>
