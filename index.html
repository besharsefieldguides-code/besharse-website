<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Boot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="crt-overlay"></div> <!-- Scanline effect -->
    
    <!-- Loading Screen -->
    <div id="loading-screen" class="overlay">
        <div class="loader">
            <div class="header-tag">SYSTEM_INITIALIZATION</div>
            <h1 id="status-text">INITIALIZING VULKAN_PIPELINES...</h1>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </div>
    </div>

    <!-- Main Menu Screen -->
    <div id="menu-screen" class="overlay hidden">
        <div class="menu-container">
            <h1 class="glitch">PROJECT: SURVIVAL</h1>
            <div class="menu-options">
                <button class="nav-btn">DEPLOY</button>
                <button class="nav-btn">LOADOUT</button>
                <button class="nav-btn">SETTINGS</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
