<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Besharse Field Guides</title>
    <!-- Modern uppercase/bold typography font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&family=Segoe+UI:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Olive Green Loading Spinner Screen Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Top Navigation Bar -->
    <nav class="navbar">
        <span class="nav-title">Besharse Field Guides</span>
        <div class="nav-links">
            <!-- Every tab now points to the same JavaScript refresher function -->
            <a href="javascript:void(0);" id="tab-home" onclick="handleTabRefresh('tab-home')" class="nav-item">Home</a>
            <a href="javascript:void(0);" id="tab-about" onclick="handleTabRefresh('tab-about')" class="nav-item">About</a>
            <a href="javascript:void(0);" id="tab-books" onclick="handleTabRefresh('tab-books')" class="nav-item">Books</a>
            <a href="javascript:void(0);" id="tab-services" onclick="handleTabRefresh('tab-services')" class="nav-item">Services</a>
            <a href="javascript:void(0);" id="tab-events" onclick="handleTabRefresh('tab-events')" class="nav-item">Events</a>
            <a href="javascript:void(0);" id="tab-blog" onclick="handleTabRefresh('tab-blog')" class="nav-item">Blog</a>
            <a href="javascript:void(0);" id="tab-contacts" onclick="handleTabRefresh('tab-contacts')" class="nav-item">Contacts</a>
            <a href="javascript:void(0);" id="tab-social" onclick="handleTabRefresh('tab-social')" class="nav-item">Social Media</a>
            <a href="javascript:void(0);" id="tab-donate" onclick="handleTabRefresh('tab-donate')" class="nav-item donate-btn">Make a Donation</a>
        </div>
    </nav>

    <!-- Hero Slider Section -->
    <header class="hero-section" id="hero-slider">
        
        <!-- Main Hero Content Overlay (Far Left) -->
        <div class="hero-content">
            <h1 class="hero-title">Welcome to<br>Besharse Field Guides</h1>
            <!-- Clicking Read More acts exactly like clicking the About tab -->
            <a href="javascript:void(0);" onclick="handleTabRefresh('tab-about')" class="btn-read-more">Read More</a>
        </div>

        <!-- Slider Controls Wrapper (Bottom Right Corner) -->
        <div class="slider-controls-container">
            <button class="slider-arrow" onclick="changeSlide(-1)">&lt;</button>
            <div class="slider-dots">
                <span class="dot" onclick="setSlide(0)"></span>
                <span class="dot" onclick="setSlide(1)"></span>
                <span class="dot" onclick="setSlide(2)"></span>
            </div>
            <button class="slider-arrow" onclick="changeSlide(1)">&gt;</button>
        </div>
        
    </header>

    <script src="script.js"></script>
</body>
</html>
