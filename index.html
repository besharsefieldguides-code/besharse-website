<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUTBREAK: PRIME SURVIVAL</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', Courier, monospace;
            background-color: #000;
            user-select: none;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* --- GAME UI STYLING --- */
        #hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 10;
            color: #fff;
            text-shadow: 2px 2px 4px #000;
        }

        .stat-bar {
            width: 200px;
            height: 15px;
            background: rgba(50, 50, 50, 0.7);
            margin: 5px 0;
            border: 1px solid #555;
            position: relative;
        }

        .stat-fill {
            height: 100%;
            width: 100%;
            transition: width 0.2s ease;
        }

        #health-fill { background: #ff3333; }
        #energy-fill { background: #ffaa00; }
        #water-fill { background: #3399ff; }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
        }
        #crosshair::before { top: 4px; left: -5px; width: 20px; height: 2px; }
        #crosshair::after { top: -5px; left: 4px; width: 2px; height: 20px; }

        #weapon-status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            color: #fff;
            text-align: right;
            text-shadow: 2px 2px 4px #000;
            font-size: 1.2rem;
        }

        /* --- INTRO & NARRATIVE OVERLAY --- */
        #intro-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #05050a;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            transition: opacity 2s ease;
        }

        #intro-text {
            width: 60%;
            text-align: center;
            font-size: 1.3rem;
            line-height: 2rem;
            margin-bottom: 40px;
            min-height: 100px;
            color: #ff3333;
        }

        .btn {
            background: #222;
            color: #fff;
            border: 1px solid #ff3333;
            padding: 15px 40px;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #ff3333;
            color: #000;
            box-shadow: 0 0 15px #ff3333;
        }

        #interaction-prompt {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffaa00;
            font-size: 1.2rem;
            z-index: 10;
            text-shadow: 2px 2px 4px #000;
            display: none;
        }
    </style>

    <!-- Import Three.js Engine Requirements via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="intro-overlay">
        <h1>OUTBREAK: PRIME SURVIVAL</h1>
        <div id="intro-text">Press the button below to initialize system architectures and awaken...</div>
        <button class="btn" id="start-btn">WAKE UP</button>
    </div>

    <div id="crosshair"></div>

    <div id="interaction-prompt">Press 'E' to Interact</div>

    <div id="hud">
        <div>HEALTH</div>
        <div class="stat-bar"><div id="health-fill" class="stat-fill"></div></div>
        <div>HUNGER</div>
        <div class="stat-bar"><div id="energy-fill" class="stat-fill"></div></div>
        <div>THIRST</div>
        <div class="stat-bar"><div id="water-fill" class="stat-fill"></div></div>
        <div style="margin-top: 15px; font-size: 0.8rem; color: #aaa;" id="mode-indicator">MODE: FOOT SURVIVAL</div>
    </div>

    <div id="weapon-status">
        <div id="weapon-name">M4A1 CARBINE</div>
        <div id="ammo-count">30 / 120</div>
        <div style="font-size: 0.8rem; color: #888; margin-top: 5px;">[LMB] Shoot | [R] Reload | [F] Build Wall</div>
    </div>

    <div id="canvas-container" id="game-canvas"></div>

    <script>
        // --- ARCHITECTURE DEFINITIONS & ENGINE PARAMETERS ---
        let scene, camera, renderer, clock;
        let player = {
            health: 100, hunger: 100, thirst: 100,
            position: new THREE.Vector3(0, 1.6, 0),
            velocity: new THREE.Vector3(),
            speed: 0.12,
            ammo: 30, maxAmmo: 30, reserveAmmo: 120,
            isDriving: false,
            currentVehicle: null
        };

        // Input Mapping System
        const keys = { w: false, a: false, s: false, d: false, e: false, r: false, f: false, Shift: false };
        const entities = { zombies: [], loot: [], vehicles: [], builds: [], environment: [] };
        let pointerLocked = false;

        // Sound Synthesis Pipeline via Web Audio API (Eliminating external audio asset dependency errors)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSynthSound(freq, type, duration, volume = 0.1) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // --- ENGINE INITIALIZATION AND GRAPHICS PIPELINE ---
        function initEngine() {
            clock = new THREE.Clock();
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a14);
            scene.fog = new THREE.FogExp2(0x0a0a14, 0.015);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.copy(player.position);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Lighting Setup
            const ambientLight = new THREE.AmbientLight(0x111122, 0.6);
            scene.add(ambientLight);

            const moonLight = new THREE.DirectionalLight(0x556688, 0.5);
            moonLight.position.set(100, 200, 50);
            moonLight.castShadow = true;
            scene.add(moonLight);

            // Generate Procedural Survival World Map Layout
            generateWorldMap();
            setupInputHooks();
            
            // Start Rendering Tick Loop
            animate();
        }

        // --- PROCEDURAL WORLD GENERATION GENERATOR ---
        function generateWorldMap() {
            // World Terrain Mesh
            const floorGeo = new THREE.PlaneGeometry(2000, 2000);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x111b11, roughness: 0.9, metalness: 0.1 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Procedural House / Starter Room Structure
            buildProceduralStructure(0, 0, 15, 12, 0x443322, "PLAYER_HOUSE");

            // Procedural Cities, Towns, & Military Outpost Bases
            // Military Zone Vector Layout
            buildProceduralStructure(60, -80, 30, 20, 0x222a22, "MILITARY_BARRACKS");
            spawnLootItem(60, 1, -80, "MILITARY_CRATE");
            spawnLootItem(65, 1, -75, "AMMO_BOX");

            // Town/City Spawns
            for (let i = 0; i < 5; i++) {
                let tx = (Math.random() - 0.5) * 400 + 100;
                let tz = (Math.random() - 0.5) * 400 - 100;
                buildProceduralStructure(tx, tz, 12, 10, 0x3a3a3a, "CITY_BUILDING");
                spawnLootItem(tx + 2, 0.5, tz + 2, "SUPPLY_CAN");
            }

            // Spawn Drivable Vehicles
            spawnDrivableVehicle(15, 0, -10);
            spawnDrivableVehicle(80, 0, -60);

            // Dynamic Entities: Population Grid for Zombies
            for (let i = 0; i < 30; i++) {
                spawnZombieEntity((Math.random() - 0.5) * 500, (Math.random() - 0.5) * 500);
            }
        }

        function buildProceduralStructure(x, z, width, height, color, tag) {
            const group = new THREE.Group();
            group.position.set(x, 0, z);

            const wallMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.7 });
            const wallGeo = new THREE.BoxGeometry(width, height, 0.5);

            // Build structural perimeter partitions
            const NorthWall = new THREE.Mesh(wallGeo, wallMat);
            NorthWall.position.set(0, height / 2, -height / 2);
            group.add(NorthWall);

            const SouthWall = new THREE.Mesh(wallGeo, wallMat);
            SouthWall.position.set(0, height / 2, height / 2);
            group.add(SouthWall);

            scene.add(group);
            entities.environment.push({ mesh: group, bounds: width / 2, tag: tag });
        }

        function spawnZombieEntity(x, z) {
            const zombieGroup = new THREE.Group();
            zombieGroup.position.set(x, 1, z);

            // 3D Realistic Character Segment Proxies
            const bodyGeo = new THREE.CylinderGeometry(0.4, 0.4, 1.8, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2e3b26, roughness: 0.8 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            zombieGroup.add(body);

            const headGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const headMat = new THREE.MeshStandardMaterial({ color: 0x4a5d3e });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.15;
            zombieGroup.add(head);

            scene.add(zombieGroup);
            entities.zombies.push({
                mesh: zombieGroup,
                health: 50,
                speed: 0.035,
                velocity: new THREE.Vector3()
            });
        }

        function spawnLootItem(x, y, z, type) {
            const geo = new THREE.BoxGeometry(0.6, 0.4, 0.6);
            let color = type === "MILITARY_CRATE" ? 0xd4af37 : 0x557755;
            const mat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.5 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            entities.loot.push({ mesh: mesh, type: type, active: true });
        }

        function spawnDrivableVehicle(x, z) {
            const vehicleGroup = new THREE.Group();
            vehicleGroup.position.set(x, 0.5, z);

            const bodyGeo = new THREE.BoxGeometry(2.5, 1, 4.5);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x7c1a1a, metalness: 0.7, roughness: 0.2 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.5;
            vehicleGroup.add(body);

            // Wheel tracks
            const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.4, 12);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111 });
            wheelGeo.rotateZ(Math.PI / 2);

            const w1 = new THREE.Mesh(wheelGeo, wheelMat); w1.position.set(1.3, 0.2, 1.5); vehicleGroup.add(w1);
            const w2 = new THREE.Mesh(wheelGeo, wheelMat); w2.position.set(-1.3, 0.2, 1.5); vehicleGroup.add(w2);
            const w3 = new THREE.Mesh(wheelGeo, wheelMat); w3.position.set(1.3, 0.2, -1.5); vehicleGroup.add(w3);
            const w4 = new THREE.Mesh(wheelGeo, wheelMat); w4.position.set(-1.3, 0.2, -1.5); vehicleGroup.add(w4);

            scene.add(vehicleGroup);
            entities.vehicles.push({ mesh: vehicleGroup, active: true, velocity: new THREE.Vector3() });
        }

        // --- RAYCASTING COMBAT, BUILDING, & LOOT SYSTEM INTERACTIONS ---
        function fireActiveWeapon() {
            if (player.ammo <= 0) {
                playSynthSound(150, 'square', 0.1, 0.2); // Empty Chamber click sound
                return;
            }

            player.ammo--;
            document.getElementById('ammo-count').innerText = `${player.ammo} / ${player.reserveAmmo}`;
            playSynthSound(880, 'sawtooth', 0.08, 0.3); // Gunfire signature simulation

            // Calculate directional forward bullet physics vectors via Raycaster
            const raycaster = new THREE.Raycaster();
            const centerVector = new THREE.Vector2(0, 0); // Directly down the screen crosshair center
            raycaster.setFromCamera(centerVector, camera);

            const targets = entities.zombies.map(z => z.mesh.children[0]); // Target cylinder hulls
            const intersects = raycaster.intersectObjects(targets);

            if (intersects.length > 0) {
                const hitObj = intersects[0].object.parent;
                const zombieInstance = entities.zombies.find(z => z.mesh === hitObj);
                if (zombieInstance) {
                    zombieInstance.health -= 25;
                    playSynthSound(400, 'triangle', 0.1, 0.4); // Hit indicator sound impact registers
                    
                    // Kinetic knockback calculation
                    const direction = new THREE.Vector3();
                    camera.getWorldDirection(direction);
                    zombieInstance.mesh.position.addScaledVector(direction, 2);

                    if (zombieInstance.health <= 0) {
                        scene.remove(zombieInstance.mesh);
                        entities.zombies = entities.zombies.filter(z => z !== zombieInstance);
                        playSynthSound(100, 'sawtooth', 0.5, 0.2); // Death grunt tone simulation
                    }
                }
            }
        }

        function reloadActiveWeapon() {
            if (player.reserveAmmo <= 0 || player.ammo === player.maxAmmo) return;
            playSynthSound(300, 'sine', 0.3, 0.2);
            setTimeout(() => {
                const needed = player.maxAmmo - player.ammo;
                const transfer = Math.min(needed, player.reserveAmmo);
                player.ammo += transfer;
                player.reserveAmmo -= transfer;
                document.getElementById('ammo-count').innerText = `${player.ammo} / ${player.reserveAmmo}`;
                playSynthSound(600, 'sine', 0.1, 0.2);
            }, 1200);
        }

        function executeBaseBuilding() {
            // Build a wall panel directly ahead of player position vectors
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);

            const wallGeo = new THREE.BoxGeometry(4, 3, 0.4);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x5c4033, roughness: 1.0 });
            const buildMesh = new THREE.Mesh(wallGeo, wallMat);

            // Compute spatial displacement point offset in front of camera
            buildMesh.position.copy(camera.position).addScaledVector(dir, 4);
            buildMesh.position.y = 1.5; // Snap cleanly to structural grid floor surface leveling
            buildMesh.rotation.y = camera.rotation.y;

            scene.add(buildMesh);
            entities.builds.push({ mesh: buildMesh });
            playSynthSound(220, 'triangle', 0.2, 0.5); // Structural execution construction tone
        }

        function checkEnvironmentalInteractions() {
            let closeToInteractable = false;

            // Scan proximity vectors relative to drivable configurations
            entities.vehicles.forEach(v => {
                let dist = camera.position.distanceTo(v.mesh.position);
                if (dist < 4.0) {
                    closeToInteractable = true;
                    if (keys.e) {
                        toggleVehicleState(v);
                        keys.e = false; // Reset toggle execution latch
                    }
                }
            });

            // Scan proximity bounds for loot crates
            entities.loot.forEach(l => {
                if (!l.active) return;
                let dist = camera.position.distanceTo(l.mesh.position);
                if (dist < 2.5) {
                    closeToInteractable = true;
                    if (keys.e) {
                        l.active = false;
                        scene.remove(l.mesh);
                        player.reserveAmmo += 30;
                        document.getElementById('ammo-count').innerText = `${player.ammo} / ${player.reserveAmmo}`;
                        playSynthSound(523, 'sine', 0.15, 0.3); // Secure inventory item chime
                        keys.e = false;
                    }
                }
            });

            document.getElementById('interaction-prompt').style.display = closeToInteractable ? 'block' : 'none';
        }

        function toggleVehicleState(vehicle) {
            player.isDriving = !player.isDriving;
            if (player.isDriving) {
                player.currentVehicle = vehicle;
                document.getElementById('mode-indicator').innerText = "MODE: DRIVING VEHICLE";
                playSynthSound(80, 'sawtooth', 0.8, 0.4); // Ignition cycle engine sound
            } else {
                player.currentVehicle = null;
                document.getElementById('mode-indicator').innerText = "MODE: FOOT SURVIVAL";
                camera.position.set(player.position.x, 1.6, player.position.z);
            }
        }

        // --- HARDWARE COMPONENT INPUT HOOK INTERFACES ---
        function setupInputHooks() {
            window.addEventListener('keydown', (e) => {
                if (keys[e.key] !== undefined) keys[e.key] = true;
                if (e.key === 'r' || e.key === 'R') reloadActiveWeapon();
                if (e.key === 'f' || e.key === 'F') executeBaseBuilding();
                if (e.key === 'e' || e.key === 'E') keys.e = true;
            });

            window.addEventListener('keyup', (e) => {
                if (keys[e.key] !== undefined) keys[e.key] = false;
                if (e.key === 'e' || e.key === 'E') keys.e = false;
            });

            document.body.addEventListener('click', () => {
                if (!pointerLocked) {
                    document.body.requestPointerLock();
                } else {
                    if (!player.isDriving) fireActiveWeapon();
                }
            });

            document.addEventListener('pointerlockchange', () => {
                pointerLocked = document.pointerLockElement === document.body;
            });

            window.addEventListener('mousemove', (e) => {
                if (!pointerLocked) return;
                // Camera orientation vectors transformation matrices parsing mouse updates
                camera.rotation.y -= e.movementX * 0.0025;
                camera.rotation.x -= e.movementY * 0.0025;
                camera.rotation.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, camera.rotation.x));
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // --- MAIN GAME LOOP RUNTIME COMPUTE ---
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            // Handle Survival Metabolic Decay State Systems
            if (Math.random() < 0.005) {
                player.hunger = Math.max(0, player.hunger - 1);
                player.thirst = Math.max(0, player.thirst - 1.5);
                document.getElementById('energy-fill').style.width = `${player.hunger}%`;
                document.getElementById('water-fill').style.width = `${player.thirst}%`;

                if (player.hunger <= 0 || player.thirst <= 0) {
                    player.health = Math.max(0, player.health - 2);
                    document.getElementById('health-fill').style.width = `${player.health}%`;
                }
            }

            // Check Interactions Proxies Loop
            checkEnvironmentalInteractions();

            // PROCESS PHYSICAL SYSTEMS: LOCOMOTION ROUTINE VIA VECTOR DRIFTS
            if (!player.isDriving) {
                // Foot Movement Processing Loop
                const moveVector = new THREE.Vector3();
                if (keys.w) moveVector.z -= 1;
                if (keys.s) moveVector.z += 1;
                if (keys.a) moveVector.x -= 1;
                if (keys.d) moveVector.x += 1;
                moveVector.normalize();

                const currentMovementSpeed = keys.Shift ? player.speed * 1.8 : player.speed;
                
                // Rotational Alignment computation
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                forward.y = 0; forward.normalize();
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                right.y = 0; right.normalize();

                const finalVelocity = new THREE.Vector3()
                    .addScaledVector(forward, -moveVector.z)
                    .addScaledVector(right, moveVector.x)
                    .normalize()
                    .multiplyScalar(currentMovementSpeed);

                camera.position.add(finalVelocity);
                player.position.copy(camera.position);
            } else {
                // Vehicle Handling Physics Model Compute Loop
                const vehicle = player.currentVehicle;
                if (vehicle) {
                    const forwardDir = new THREE.Vector3(0, 0, -1).applyQuaternion(vehicle.mesh.quaternion);
                    
                    if (keys.w) vehicle.velocity.addScaledVector(forwardDir, 0.15);
                    if (keys.s) vehicle.velocity.addScaledVector(forwardDir, -0.1);
                    
                    // Rotational steering computations
                    if (keys.a) vehicle.mesh.rotation.y += 0.03;
                    if (keys.d) vehicle.mesh.rotation.y -= 0.03;

                    // Dampen friction velocities over time
                    vehicle.velocity.multiplyScalar(0.96);
                    vehicle.mesh.position.add(vehicle.velocity);

                    // Sync Client Camera system directly to vehicle frame tracking matrix
                    camera.position.copy(vehicle.mesh.position).add(new THREE.Vector3(0, 2.5, 0));
                    player.position.copy(vehicle.mesh.position);

                    // Procedural Engine Auditory Sound Modulation
                    if (Math.abs(vehicle.velocity.length()) > 0.02 && Math.random() < 0.15) {
                        playSynthSound(60 + (vehicle.velocity.length() * 200), 'sawtooth', 0.1, 0.15);
                    }
                }
            }

            // PROCESSING ENEMY AI MECHANICS (State Chase Routines)
            entities.zombies.forEach(z => {
                let distanceToPlayer = z.mesh.position.distanceTo(player.position);

                if (distanceToPlayer < 40.0 && distanceToPlayer > 1.2) {
                    // Chase target phase logic
                    const direction = new THREE.Vector3().subVectors(player.position, z.mesh.position);
                    direction.y = 0; direction.normalize();
                    z.mesh.position.addScaledVector(direction, z.speed);
                    z.mesh.lookAt(player.position.x, z.mesh.position.y, player.position.z);
                    
                    // Procedural shuffling step tones matching velocity tracking states
                    if (Math.random() < 0.02) {
                        playSynthSound(120, 'triangle', 0.2, 0.05);
                    }
                } else if (distanceToPlayer <= 1.2) {
                    // Attack state interval cycle execution
                    if (Math.random() < 0.04) {
                        player.health = Math.max(0, player.health - 5);
                        document.getElementById('health-fill').style.width = `${player.health}%`;
                        playSynthSound(180, 'sawtooth', 0.2, 0.4); // Player hurt grunt frequency register
                    }
                }
            });

            renderer.render(scene, camera);
        }

        // --- NARRATIVE TIMELINE CAPTURE INTRO HANDLING ---
        document.getElementById('start-btn').addEventListener('click', () => {
            const overlay = document.getElementById('intro-overlay');
            const introText = document.getElementById('intro-text');
            
            document.getElementById('start-btn').style.display = 'none';
            audioCtx.resume();

            // Emergency Alert Broadcast System simulated timeline script events
            playSynthSound(440, 'sine', 2.0, 0.5); // EAS Attenuation tone simulation

            const alerts = [
                "EMERGENCY BROADCAST ROUTINE SYSTEM DETECTED...",
                "AN UNKNOWN PATHOGEN IS CAUSING MASS CIVIL UNREST.",
                "DO NOT APPROACH TARGETED ENTITIES. MARTIAL LAW IS ENFORCED.",
                "YOU AWAKEN IN YOUR HOUSE ROOM. GET TO THE MILITARY OUTPOST FOR EVACUATION."
            ];

            let index = 0;
            const textInterval = setInterval(() => {
                if (index < alerts.length) {
                    introText.innerText = alerts[index];
                    playSynthSound(200, 'square', 0.1, 0.2);
                    index++;
                } else {
                    clearInterval(textInterval);
                    overlay.style.opacity = 0;
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        initEngine();
                    }, 2000);
                }
            }, 3000);
        });
    </script>
</body>
</html>
