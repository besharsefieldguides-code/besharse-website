<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CORE_ENGINE_v1</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <!-- Persistent UI Overlay -->
    <div id="ui-layer">
        <div id="main-menu" class="screen">
            <h1>STRIKE_CORE</h1>
            <div class="menu-grid">
                <button onclick="Game.initCombat()">DEPLOY</button>
                <button onclick="Game.showInventory()">INVENTORY</button>
                <button onclick="Game.showCrates()">CRATE_DEPOT</button>
            </div>
            <div class="user-stats">LEVEL: <span id="lvl">1</span> | KEYS: <span id="keys">0</span></div>
        </div>

        <div id="inventory-screen" class="screen hidden">
            <h1>INVENTORY</h1>
            <div id="inv-list" class="grid"></div>
            <button onclick="Game.showMenu()">BACK</button>
        </div>

        <div id="crate-screen" class="screen hidden">
            <h1>CRATE_DEPOT</h1>
            <div id="crate-grid" class="grid">
                <button onclick="Game.openCrate('common')">COMMON (3 Keys)</button>
                <button onclick="Game.openCrate('rare')">RARE (6 Keys)</button>
            </div>
            <button onclick="Game.showMenu()">BACK</button>
        </div>
    </div>
    
    <div id="game-canvas"></div>
    <script src="game.js"></script>
</body>
</html>
