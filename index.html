<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical FPS Sandbox</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* Minimalist Competitive HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
            box-sizing: border-box;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        .hud-card {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 4px;
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            border-left: 4px solid #00ff66;
        }
        #ammo-display {
            border-left: none;
            border-right: 4px solid #00ff66;
        }
        /* Tiny Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background-color: #00ff66;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 4px #00ff66;
        }
        /* State Overlay */
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 10, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            cursor: pointer;
            text-align: center;
            z-index: 10;
        }
        #instructions {
            font-size: 32px;
            font-weight: 800;
            color: #00ff66;
            margin-bottom: 10px;
        }
        .sub-text {
            color: #aaaaaa;
            font-size: 16px;
        }
    </style>
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="blocker">
        <div id="instructions">CLICK TO MATCHMAKE</div>
        <div class="sub-text">WASD = Move | Mouse = Aim | Left Click = Shoot | R = Reload</div>
    </div>

    <div id="hud">
        <div class="hud-row">
            <div class="hud-card">ROUND: <span id="round-val">1</span></div>
            <div class="hud-card">BOTS LEFT: <span id="bots-val">1</span></div>
        </div>
        <div class="hud-row" style="justify-content: flex-end;">
            <div class="hud-card" id="ammo-display">AMMO: <span id="ammo-val">30</span>/30</div>
        </div>
    </div>
    
    <div id="crosshair"></div>

    <canvas id="game-canvas"></canvas>

    <script src="PlayerMovement.js"></script>
</body>
</html>
