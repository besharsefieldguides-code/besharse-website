<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Besharse Field Guides</title>
    <!-- Importing a clean, elegant nature/wildlife font style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Segoe+UI:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Olive Green Loading Spinner Screen Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Top Navigation Bar -->
    <nav class="navbar">
        <!-- Top Left Corner Text: Now Olive Green & Wildlife Font -->
        <span class="nav-title">Besharse Field Guides</span>
        <div class="nav-links">
            <!-- Clicking Home triggers the spinner, then reloads the page -->
            <a href="javascript:void(0);" onclick="triggerHomeRefresh();" class="nav-item active-tab">Home</a>
            <a href="#about" class="nav-item">About</a>
            <a href="#books" class="nav-item">Books</a>
            <a href="#services" class="nav-item">Services</a>
            <a href="#events" class="nav-item">Events</a>
            <a href="#blog" class="nav-item">Blog</a>
            <a href="#contacts" class="nav-item">Contacts</a>
            <a href="#social-media" class="nav-item">Social Media</a>
            <!-- Donation Tab: Custom Yellow Text -->
            <a href="#donate" class="nav-item donate-btn">MAKE A DONATION</a>
        </div>
    </nav>

    <!-- Hero Slider Section -->
    <header class="hero-section" id="hero-slider">
        
        <!-- Main Hero Content Overlay (Moved closer to the left edge) -->
        <div class="hero-content">
            <h1 class="hero-title">Welcome to<br>Besharse Field Guides</h1>
            <a href="#about" class="btn-read-more">Read More</a>
        </div>

        <!-- Slider Controls Wrapper (Bottom Right Corner) -->
        <div class="slider-controls-container">
            <button class="slider-arrow" onclick="changeSlide(-1)">&lt;</button>
            <div class="slider-dots">
                <span class="dot" onclick="setSlide(0)"></span>
                <span class="dot" onclick="setSlide(1)"></span>
                <span class="dot" onclick="setSlide(2)"></span>
            </div>
            <button class="slider-arrow" onclick="changeSlide(1)">&gt;</button>
        </div>
        
    </header>

    <!-- Adding inline function specifically for the Home refresh feature -->
    <script>
        function triggerHomeRefresh() {
            var overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex'; // Shows the loading spinner screen
            setTimeout(function() {
                window.location.reload(); // Refreshes the page after 1.5 seconds
            }, 1500);
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
