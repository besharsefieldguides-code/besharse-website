<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Besharse Field Guides - Interface Design</title>
    
    <!-- Typography & Font Performance Links -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&family=Segoe+UI:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Core Stylesheet Link -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Browser Tab Favicon -->
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>

    <!-- Olive Green Loading Spinner Screen Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Top Navigation Bar (Deactivated Placeholder Layout) -->
    <nav class="navbar">
        <span class="nav-title">Besharse Field Guides</span>
        <div class="nav-links">
            <a href="javascript:void(0);" id="tab-home" class="nav-item active-tab">Home</a>
            <a href="javascript:void(0);" id="tab-about" class="nav-item">About</a>
            <a href="javascript:void(0);" id="tab-books" class="nav-item">Books</a>
            <a href="javascript:void(0);" id="tab-services" class="nav-item">Services</a>
            <a href="javascript:void(0);" id="tab-events" class="nav-item">Events</a>
            <a href="javascript:void(0);" id="tab-blog" class="nav-item">Blog</a>
            <a href="javascript:void(0);" id="tab-contact" class="nav-item">Contact</a>
            <a href="javascript:void(0);" id="tab-social" class="nav-item">Social Media</a>
            <a href="javascript:void(0);" id="tab-donate" class="nav-item donate-btn">Make a Donation</a>
        </div>
    </nav>

    <!-- Hero Slider Section Prototype -->
    <header class="hero-section" id="hero-slider">
        <!-- Isolated background container strictly for executing smooth CSS animations -->
        <div id="hero-bg" class="hero-bg"></div>

        <div class="hero-content">
            <h1 class="hero-title">Welcome to<br>Besharse Field Guides</h1>
            <a href="javascript:void(0);" class="btn-read-more">Read More</a>
        </div>

        <!-- Slider Controls Wrapper (Configured with exactly 6 tracking dots) -->
        <div class="slider-controls-container">
            <button class="slider-arrow" onclick="changeSlide(-1)">&lt;</button>
            <div class="slider-dots">
                <span class="dot" onclick="setSlide(0)"></span>
                <span class="dot" onclick="setSlide(1)"></span>
                <span class="dot" onclick="setSlide(2)"></span>
                <span class="dot" onclick="setSlide(3)"></span> 
                <span class="dot" onclick="setSlide(4)"></span> 
                <span class="dot" onclick="setSlide(5)"></span> 
            </div>
            <button class="slider-arrow" onclick="changeSlide(1)">&gt;</button>
        </div>
    </header>

    <!-- Core Interactive Slideshow Script -->
    <script src="script.js"></script>
</body>
</html>
