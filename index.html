<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Besharse Field Guides</title>
    <!-- Google Fonts: Antonio (Tall, clean wildlife display) and Inter (Navigation tabs) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@700&family=Inter:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Step 2: Navbar Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <!-- Brand Title -->
            <span class="brand-title">Besharse Field Guides</span>
            
            <!-- Navigation Tabs -->
            <div class="nav-tabs">
                <a href="#home" class="nav-tab-link">Home</a>
                <a href="#about" class="nav-tab-link">About</a>
                <a href="#books" class="nav-tab-link">Books</a>
                <a href="#services" class="nav-tab-link">Services</a>
                <a href="#events" class="nav-tab-link">Events</a>
                <a href="#blog" class="nav-tab-link">Blog</a>
                <a href="#contact" class="nav-tab-link">Contact</a>
                <a href="#donate" class="nav-tab-link">Donate</a>
            </div>
        </div>
    </nav>

    <!-- Main Content Area with Clean Zoomed-Out Carousel -->
    <main class="main-content">
        <section class="hero-section">
            <!-- 8-Image Slideshow Wrapper -->
            <div class="carousel-container">
                <img src="Hippo.jpeg" alt="Hippo" class="carousel-slide active">
                <img src="Crocodile.jpeg" alt="Crocodile" class="carousel-slide">
                <img src="Elephant.jpeg" alt="Elephant" class="carousel-slide">
                <img src="Lion.jpeg" alt="Lion" class="carousel-slide">
                <img src="Rhino.jpeg" alt="Rhino" class="carousel-slide">
                <img src="Snake.jpeg" alt="Snake" class="carousel-slide">
                <img src="Giraffe.jpeg" alt="Giraffe" class="carousel-slide">
                <img src="Zebra.jpeg" alt="Zebra" class="carousel-slide">
            </div>
        </section>
    </main>

    <!-- Project Script Execution -->
    <script src="carousel.js"></script>
</body>
</html>
