<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Browser Game - Loading</title>
    <style>
        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Fullscreen Loading Wrapper */
        #loading-screen-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            /* Placeholder background grid overlay - replace URL with your FPS game splash art */
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.95) 0%, rgba(20, 20, 25, 0.9) 100%), 
                        radial-gradient(circle at center, transparent 0%, #000000 100%);
            background-size: cover;
            background-position: center;
            transition: opacity 0.8s ease-in-out, visibility 0.8s;
        }

        /* Top Header Area */
        .loading-header {
            text-align: center;
            margin-top: 20px;
        }

        .game-title {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            margin-bottom: 5px;
        }

        .game-subtitle {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ff3e3e; /* Tactical red accent */
        }

        /* Center Spinner Area */
        .loading-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.05);
            border-left-color: #ff3e3e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Bottom Status & Progress Area */
        .loading-footer {
            width: 100%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .status-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .loading-status {
            font-size: 0.85rem;
            color: #a0a0a5;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
        }

        .loading-percentage {
            font-size: 1.1rem;
            color: #ffffff;
            font-weight: 700;
            font-family: monospace;
        }

        /* Progress Bar Track */
        .progress-bar-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
        }

        /* Progress Bar Fill */
        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff3e3e, #ff6b6b);
            border-radius: 3px;
            transition: width 0.1s ease-out;
            box-shadow: 0 0 10px rgba(255, 62, 62, 0.5);
        }

        /* Interactive Gameplay Tips Box */
        .tips-container {
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 15px;
        }

        .tip-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #ff3e3e;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .tip-text {
            font-size: 0.9rem;
            color: #e0e0e5;
            line-height: 1.4;
            min-height: 40px;
            transition: opacity 0.3s ease-in-out;
        }

        /* Fade class for smooth transition of loading text screen disappearance */
        .fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- START LOADING SCREEN UI -->
    <div id="loading-screen-container">
        
        <!-- Top Section: Branding -->
        <div class="loading-header">
            <h1 class="game-title">Project: WebFront</h1>
            <div class="game-subtitle">Next-Gen Web Tactical FPS</div>
        </div>

        <!-- Middle Section: Visual Indicator -->
        <div class="loading-center">
            <div class="spinner"></div>
        </div>

        <!-- Bottom Section: Progress Tracking & Game Hints -->
        <div class="loading-footer">
            <div class="status-container">
                <span id="loading-status-text" class="loading-status">Initializing Game Engine...</span>
                <span id="loading-percentage-text" class="loading-percentage">0%</span>
            </div>
            
            <div class="progress-bar-track">
                <div id="progress-bar-fill" class="progress-bar-fill"></div>
            </div>

            <div class="tips-container">
                <div class="tip-label">Tactical Hint</div>
                <div id="game-tip-text" class="tip-text">Headshots deal structural multiplier damage. Control your weapon burst intervals.</div>
            </div>
        </div>

    </div>
    <!-- END LOADING SCREEN UI -->

    <script>
        // Array of gameplay hints to rotate through during asset loading
        const gameplayTips = [
            "Headshots deal structural multiplier damage. Control your weapon burst intervals.",
            "Reloading while a bullet is still in the chamber speeds up your tactical reload time.",
            "Listen carefully to footsteps; spatial audio reveals enemies creeping up behind walls.",
            "Your movement speed varies depending on the weight of the weapon currently equipped.",
            "Keep an eye on weapon durability and ammo reserves before entering high-traffic hot zones."
        ];

        // Status update text array mapped roughly to engine progress percentages
        const statusUpdates = [
            { threshold: 0, text: "Initializing WebGL contexts and canvas pipelines..." },
            { threshold: 20, text: "Compiling PBR shaders and material libraries..." },
            { threshold: 45, text: "Streaming low-poly/high-poly 3D weapon meshes..." },
            { threshold: 70, text: "Decompressing audio bundles and environment map data..." },
            { threshold: 90, text: "Establishing secure client handshake with server architecture..." },
            { threshold: 100, text: "Ready to deploy." }
        ];

        let currentProgress = 0;
        let tipIndex = 0;

        // DOM elements references
        const progressBarFill = document.getElementById('progress-bar-fill');
        const percentageText = document.getElementById('loading-percentage-text');
        const statusText = document.getElementById('loading-status-text');
        const tipTextElement = document.getElementById('game-tip-text');
        const loadingScreen = document.getElementById('loading-screen-container');

        // Function to smoothly increment status text depending on percent
        function updateStatusText(percent) {
            for (let i = statusUpdates.length - 1; i >= 0; i--) {
                if (percent >= statusUpdates[i].threshold) {
                    statusText.textContent = statusUpdates[i].text;
                    break;
                }
            }
        }

        // Simulates the progress bar fill. Replace this logic later with your actual engine asset loading metrics.
        function simulateLoading() {
            const loadingInterval = setInterval(() => {
                // Add a random increment amount for dynamic realism
                currentProgress += Math.floor(Math.random() * 4) + 1;
                
                if (currentProgress >= 100) {
                    currentProgress = 100;
                    clearInterval(loadingInterval);
                    clearInterval(tipsInterval);
                    
                    // Final UI Update
                    progressBarFill.style.width = '100%';
                    percentageText.textContent = '100%';
                    updateStatusText(100);

                    // Smooth transition into game scene
                    setTimeout(() => {
                        loadingScreen.classList.add('fade-out');
                    }, 800);
                } else {
                    progressBarFill.style.width = `${currentProgress}%`;
                    percentageText.textContent = `${currentProgress}%`;
                    updateStatusText(currentProgress);
                }
            }, 150);
        }

        // Rotate gameplay tips smoothly using a CSS cross-fade timing approach
        const tipsInterval = setInterval(() => {
            tipTextElement.style.opacity = 0;
            setTimeout(() => {
                tipIndex = (tipIndex + 1) % gameplayTips.length;
                tipTextElement.textContent = gameplayTips[tipIndex];
                tipTextElement.style.opacity = 1;
            }, 300);
        }, 4000);

        // Execute loading simulation on load
        window.addEventListener('DOMContentLoaded', () => {
            simulateLoading();
        });
    </script>
</body>
</html>
