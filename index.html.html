<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Besharse Field Guides</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="page-loader" class="loader-overlay">
    <div class="spinner"></div>
</div>

<nav class="navbar">
    <div class="nav-container">
        <!-- Clean isolated left brand layout -->
        <a href="/" class="brand">Besharse Field Guides</a>

        <!-- Right Side Menu Components Grid -->
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/books">Books</a></li>
                <li><a href="/blog">Blog</a></li>
            </ul>

            <div class="search-box-container">
                <div class="search-box">
                    <input type="text" placeholder="Search...">
                    <button type="submit"><i class="fas fa-search"></i></button>
                </div>
            </div>

            <!-- Hamburger Dropdown -->
            <div class="dropdown">
                <button class="dropbtn" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="dropdown-content" id="dropdownMenu">
                    <a href="/photos">Photos</a>
                    <a href="/events">Events</a>
                    <a href="/services">Services</a>
                    <a href="/contact">Contact</a>
                    <a href="/donate">Donate</a>
                </div>
            </div>

            <!-- Vertical Divider positioned perfectly on the right cluster edge -->
            <div class="nav-divider"></div>

            <!-- Profile Interactive Widget (With Text Label next to it) -->
            <div class="profile-container" id="profileGroup">
                <button class="profile-icon-btn" id="profileBtn" aria-label="User Profile">
                    <i class="fas fa-user-circle"></i>
                    <span id="profileLabel" class="profile-text-label">Sign In</span>
                </button>
                
                <!-- Profile Action Menu (Shifted up 75%) -->
                <div class="profile-dropdown" id="profileDropdown">
                    <button class="prof-drop-item" onclick="switchAccount()"><i class="fas fa-exchange-alt"></i> Switch Account</button>
                    <button class="prof-drop-item" onclick="handleSignOut()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
                    <button class="prof-drop-item" onclick="window.location.href='auth.html'"><i class="fas fa-user-plus"></i> Sign In</button>
                </div>
            </div>

        </div>
    </div>
</nav>

<header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <p class="origin">Founded in Monette, Arkansas</p>
        <h1>Besharse Field Guides</h1>
        <p class="tagline">Providing comprehensive, expert-level wildlife field guides.</p>
        <div class="hero-btns">
            <a href="/discover" class="btn-primary">Read More</a>
        </div>
    </div>
    <div class="hero-footer">
        <p>&copy; 2026 Besharse Field Guides. All Rights Reserved.</p>
    </div>
</header>

<script src="script.js"></script>
</body>
</html>
