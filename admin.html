<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Besharse Field Guides</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

<div id="page-loader" class="loader-overlay">
    <div class="spinner"></div>
</div>

<!-- Simplified Admin Specific Top Dashboard Nav -->
<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="brand"><i class="fas fa-shield-alt"></i> Besharse Control Deck</a>
        
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="index.html">View Live Site</a></li>
            </ul>
            <div class="nav-divider"></div>
            <div class="profile-container">
                <button class="profile-icon-btn" id="profileBtn">
                    <i class="fas fa-user-shield"></i>
                    <span class="profile-text-label">Admin Control</span>
                </button>
                <div class="profile-dropdown" id="profileDropdown">
                    <button class="prof-drop-item" onclick="switchAccount()"><i class="fas fa-exchange-alt"></i> Switch Account</button>
                    <button class="prof-drop-item" onclick="handleSignOut()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- Admin Panel Main Content Grid Container -->
<main class="admin-main">
    <header class="admin-view-header">
        <div>
            <h1>User Accounts Management</h1>
            <p>Review, audit, suspend, or revoke access levels across security groups.</p>
        </div>
        <div class="admin-summary-stats">
            <div class="stat-pill">Total: <span id="stat-total">0</span></div>
            <div class="stat-pill banned">Banned: <span id="stat-banned">0</span></div>
        </div>
    </header>

    <!-- Master User Database Card -->
    <div class="admin-card">
        <div class="table-responsive-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>User Profile</th>
                        <th>Email Address</th>
                        <th>Security Level</th>
                        <th>Status</th>
                        <th class="text-right">Moderation Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-user-rows">
                    <!-- Dynamic Rows populated seamlessly via script.js -->
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
