<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Besharse Field Guides</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

    <nav class="navbar" style="position: fixed; top: 0; width: 100%;">
        <div class="nav-container">
            <a href="/" class="brand">Besharse Field Guides <span style="color:#f2bc57; font-size: 0.85rem; margin-left: 10px;">ADMINISTRATOR</span></a>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-shield-alt"></i> Control Panel</h1>
            <a href="index.html" class="btn-secondary"><i class="fas fa-arrow-left"></i> Return to Dashboard</a>
        </div>

        <div class="admin-card">
            <div style="overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>User Name</th>
                            <th>Email Address</th>
                            <th>Logged IP Address</th>
                            <th>Status</th>
                            <th>Administrative Action</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
