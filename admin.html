<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - BFG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-bg">

<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-top">
            <i class="fas fa-shield-alt"></i>
            <span>Admin Central</span>
        </div>
        <nav class="sidebar-nav">
            <a href="admin.html" class="active"><i class="fas fa-users"></i> Users</a>
            <a href="index.html"><i class="fas fa-home"></i> Back to Site</a>
        </nav>
        <button class="logout-foot" onclick="handleSignOut()">Logout</button>
    </aside>

    <main class="admin-content">
        <header class="content-header">
            <h2>User Management</h2>
            <div class="stats-box">
                Total Users: <span id="stat-count">0</span>
            </div>
        </header>

        <section class="table-card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email Address</th>
                        <th>Status</th>
                        <th style="text-align:right">Actions</th>
                    </tr>
                </thead>
                <tbody id="userRows">
                    </tbody>
            </table>
            <div id="noData" class="empty-msg" style="display:none">
                <i class="fas fa-folder-open"></i>
                <p>No user accounts registered yet.</p>
            </div>
        </section>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
