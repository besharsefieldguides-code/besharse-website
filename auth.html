<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - Besharse Field Guides</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Account Access</h2>
                <p>Welcome back to Besharse Field Guides</p>
            </div>

            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab-btn active">Sign In</button>
                <button id="tab-register" class="auth-tab-btn">Sign Up</button>
            </div>

            <form id="login-form" class="auth-form active-form" onsubmit="event.preventDefault(); handleAuthSubmit();">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth-submit">Sign In</button>
            </form>

            <form id="register-form" class="auth-form" onsubmit="event.preventDefault(); handleAuthSubmit();">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth-submit">Create Account</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
